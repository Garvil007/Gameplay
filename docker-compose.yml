services:
  overpass:
    image: wiktorn/overpass-api:latest
    container_name: overpass-usa
    restart: unless-stopped

    environment:
      OVERPASS_MODE: init
      OVERPASS_META: "no"

      # Full United States extract from Geofabrik (~13 GB compressed)
      OVERPASS_PLANET_URL: https://download.geofabrik.de/north-america/us-latest.osm.pbf
      OVERPASS_PLANET_PREPROCESS: 'mv /db/planet.osm.bz2 /db/planet.osm.pbf && osmium cat -o /db/planet.osm.bz2 /db/planet.osm.pbf && rm /db/planet.osm.pbf'

      # Daily diffs for the entire US
      OVERPASS_DIFF_URL: https://download.geofabrik.de/north-america/us-updates/
      OVERPASS_UPDATE_SLEEP: 86400

      OVERPASS_COMPRESSION: gz
      OVERPASS_RULES_LOAD: 10

      # Performance — no rate limits for local
      OVERPASS_FASTCGI_PROCESSES: 8
      OVERPASS_RATE_LIMIT: 0
      OVERPASS_MAX_TIMEOUT: 1000
      OVERPASS_SPACE: 12884901888 # 12 GB RAM for queries

      OVERPASS_STOP_AFTER_INIT: "false"

    volumes:
      - ./overpass_db:/db

    ports:
      - "8080:80"
    # ⚠️ HARDWARE REQUIREMENTS FOR FULL US:
    # - Min 16 GB RAM allocated to Docker (20 GB recommended)
    # - Min 150 GB free disk space
    # - Initial build: 3-6 hours depending on hardware and internet speed
    #
    # STATE-SPECIFIC ALTERNATIVE (if you only need a few states):
    # Change OVERPASS_PLANET_URL above to one of these:
    #   California:    https://download.geofabrik.de/north-america/us/california-latest.osm.pbf
    #   Texas:         https://download.geofabrik.de/north-america/us/texas-latest.osm.pbf
    #   New York:      https://download.geofabrik.de/north-america/us/new-york-latest.osm.pbf
    #   Florida:       https://download.geofabrik.de/north-america/us/florida-latest.osm.pbf
    #   Full list:     https://download.geofabrik.de/north-america/us.html
    #
    # To combine multiple states, you'd need to merge PBFs with osmium:
    #   osmium merge california-latest.osm.pbf texas-latest.osm.pbf -o combined.osm.pbf
